<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
  <style>
	body{
	position:relative;
	min-height:100vh;
	display:flex;
	justify-content:center;
	align-items:center;
	overflow:hidden;
	}
	
	body::before{
	content:"";
	position:fixed;
	top:0;
	left:0;
	width:100%;
	height:100%;
  background-image: url("/pet.jpg.jpg");
	background-position:center;
	background-size:cover;
	background-attachment: fixed;
	filter:blur(8px);
	z-index:-1;
	}  
	
    .form-container {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 30px; 
      border-radius: 12px; 
      width: 500px; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
    }
 
    h1 {
      text-align: center; 
      margin-bottom: 25px; 
      color: #222; 
    }

    
    .row {
      display: flex; 
      gap: 20px;
      margin-bottom: 15px; 
    }

    
    .field {
      flex: 1; 
      display: flex; 
      flex-direction: column; 
    }


    label {
      margin-bottom: 6px; 
      font-weight: bold; 
      color: #333;
    }

    
    input, select {
      padding: 12px; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
      background: #f9f9f9; 
      font-size: 15px; 
    }

    button {
      width: 100%; 
      margin-top: 20px; 
      padding: 12px; 
      background-color:#74a4d8;
      color: white; 
      border: none; 
      border-radius: 6px;
    }

 
    button:hover {
      background-color: #2c65b2;
    }

.error-message {
            background: #ffdddd;
            padding: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #ff4d4d;
            color: #b30000;
            font-weight: bold;
            border-radius: 5px;
        }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Create New Account</h1>

<% if (locals.error) { %>
    <div class="error-message">
        <%= error %>
    </div>
    <% } %>

    
    <form action="/signup" method="POST">
      <div class="row">
        <div class="field">
          <label>Name</label> 
          <input type="text" name="name" placeholder="Enter your name" >
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="05XXXXXXXX" >
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="example@email.com" >
        </div>
        <div class="field">
          <label>Gender</label>
          <select name="gender" >
            <option value="" disabled selected>Select your gender</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
          </select>
        </div>
      </div>
      
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" >
      </div>

      <button type="submit">Create Account</button>
    </form>
    
    
  </div>
</body>
</html>
