<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>new Appointment</title>
        <link rel="stylesheet" href="/style.css">
		<style>
	body::before{
	content:"";
	position:fixed;
	top:0;
	left:0;
	width:100%;
	height:100%;
  background-image: url("/pet.jpg.jpg");
	background-position:center;
	background-size:cover;
	background-attachment: fixed;
	filter:blur(8px);
	z-index:-1;
	}            
.row { 
  display:flex;
  gap:30px; 
  margin-bottom:15px;
}
  
.field { 
  flex:1; 
  display:flex; 
  flex-direction:column; 
}
.form-container {
      margin:0 auto;
      background-color: rgba(255, 255, 255, 0.95);
      padding: 30px; 
      border-radius: 12px; 
      width: 700px; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
    }
.main {
    margin-left: 240px;
    padding: 20px;
    width: 100%;
}

.title {
    font-size: 28px;
    margin-bottom: 20px;
    color: #1e90ff;
}
form label {
    font-weight: bold;
    color: #1e90ff;
}

form input,
form select {
    width: 250px;
    padding: 8px;
    border: 1px solid #a4b0be;
    border-radius: 5px;
}

form button {
    padding: 10px 15px;
    margin-top: 15px;
    background: #4da3ff;
    color: white;
    border: none;
    border-radius: 5px;
}

form button:hover {
    background: #1e90ff;
}

table {
    width: 80%;
    background: white;
    border-collapse: collapse;
    box-shadow: 0 0 5px #c8d6e5;
    margin-top: 20px;
}

table th, table td {
    padding: 12px;
    border: 1px solid #dfe4ea;
}

table th {
    background: #4da3ff;
    color: white;
}

table tr:hover {
    background: #f1f7ff;
}
.error-message {
            background: #ffdddd;
            padding: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #ff4d4d;
            color: #b30000;
            font-weight: bold;
            border-radius: 5px;
        }
		</style>

</head>

<body>

<section class="menu">
<div class="nav">
<div class="logotitle">
    <span style="font-size: 30px; margin-bottom:27px;  cursor: pointer" onclick="openNav()">☰</span>
	<h1 style=" margin-bottom:27px;">Pet Cli<b>nic</b></h1></div>
<ul style=" margin-bottom:23px; margin-left:-15px;">

   <li><a href="/home#Aboutus">About us</a></li>
 </ul>
</div>
</section>

<button class="LogOut" onclick="location.href='/logout'">Log Out</button>

    </div>
</div>

<script>
function openNav() {
    document.getElementById("sideMenu").style.width = "250px";
    document.getElementById("contentArea").style.marginLeft = "250px";
}

function closeNav() {
    document.getElementById("sideMenu").style.width = "0";
    document.getElementById("contentArea").style.marginLeft = "0";
}

function showContent(section) {
    const contentArea = document.querySelector(".contentText");
    contentArea.innerHTML = `<h2>${section}</h2><h3>Content for ${section}</h3>`;
}
</script>


 <div class="form-container">      
        <h1 class="title">New appointment</h1>
<% if (locals.error) { %>
    <div class="error-message">
        <%= error %>
    </div>
    <% } %>
    <form action="/addappointment" method="POST">
	
       <div class="row">
	     <div class="field">
        <label>Date</label><br>
        <input type="date" name="date" required>
        <br><br>
        </div>
	     <div class="field">
        <label>Pet</label><br>
        <input type="text" name="pet" placeholder="pet" required>
        <br><br>
		</div>
		</div>

       <div class="row">
	     <div class="field">		
        <label>Doctor</label><br>
        <input type="text" name="doctor" placeholder="doctor" required>
        <br><br>
		</div>

	     <div class="field">
        <label>Reason for visit</label><br>
        <input type="text" name="reason" placeholder="Reason" required>
        <br><br>
		</div>
		</div>
		
       

        <button type="submit">Add Appointment</button>

    </form>
</div>
</body>
</html>
